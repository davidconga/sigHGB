<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIGHGB · Sistema Integrado de Gestão · Hospital Geral de Benguela</title>
  </head>
  <body>
    <div id="root">
      <!-- Splash inicial enquanto JS carrega -->
      <div id="initial-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a1f37,#143d6b,#194c85);font-family:system-ui,sans-serif;">
        <div style="background:#fff;border-radius:50%;padding:18px;box-shadow:0 20px 50px rgba(0,0,0,.3);animation:pulse 2s ease-in-out infinite;">
          <img src="/logo.png" alt="HGB" style="width:100px;height:100px;object-fit:contain;display:block;" />
        </div>
        <h1 style="color:#fff;margin-top:30px;font-size:18px;letter-spacing:2px;font-weight:700;">HOSPITAL GERAL DE BENGUELA</h1>
        <p style="color:#cddff0;font-size:13px;margin-top:4px;">Sistema Integrado de Gestão</p>
        <style>@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.05);opacity:.8;}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
